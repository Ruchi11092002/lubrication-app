<!DOCTYPE html>
<html>
<head>
    <title>Add Lubrication Master</title>
</head>
<body>

<h2>Add Lubrication Master Entry</h2>

<form method="POST">

    <label>Equipment Name:</label><br>
    <input type="text" name="equipment_name" required><br><br>

    <label>Part Name:</label><br>
    <input type="text" name="part_name" required><br><br>

    <label>Lubrication Type:</label><br>
    <input type="text" name="lubrication_type" required><br><br>

    <label>Frequency (Days):</label><br>
    <input type="number" name="frequency_days" required><br><br>

    <label>Default Start Date:</label><br>
    <input type="date" name="default_start_date" required><br><br>

    <label>Responsible Emails (comma separated):</label><br>
    <input type="text" name="responsible_emails" required><br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
